services:
  uno:
    build: .
    restart: unless-stopped
    networks:
      - proxy
    environment:
      - PORT=5050
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5050"]
      interval: 30s
      timeout: 5s
      retries: 3

  npm:
    image: jc21/nginx-proxy-manager:latest
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "81:81"
    volumes:
      - npm-data:/data
      - npm-letsencrypt:/etc/letsencrypt
    networks:
      - proxy
    depends_on:
      - uno

networks:
  proxy:

volumes:
  npm-data:
  npm-letsencrypt:
